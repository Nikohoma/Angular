<div class="card shadow-sm border-0">
  <div class="card-header bg-success text-white">
    <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Add New Course</h4>
  </div>
  <div class="card-body bg-light">
    <form (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label for="title" class="form-label fw-bold text-secondary">Title</label>
        <input type="text" id="title" name="title" class="form-control form-control-lg" [(ngModel)]="newCourse.title"
          required placeholder="Course Title">
      </div>
      <div class="mb-3">
        <label for="instructor" class="form-label fw-bold text-secondary">Instructor</label>
        <input type="text" id="instructor" name="instructor" class="form-control form-control-lg"
          [(ngModel)]="newCourse.instructor" required placeholder="Instructor Name">
      </div>
      <div class="mb-4">
        <label for="duration" class="form-label fw-bold text-secondary">Duration (in hrs)</label>
        <input type="number" id="duration" name="duration" class="form-control form-control-lg"
          [(ngModel)]="newCourse.duration" required min="1" placeholder="e.g. 10">
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-outline-success btn-lg shadow-sm">Submit Course</button>
      </div>
    </form>
  </div>
</div>
