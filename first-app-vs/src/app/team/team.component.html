
<div class="container m-5 text-center mx-auto"></div>
<h1>Team Information</h1>
<table class="table table-hover table-dark">
  <thead>
    <tr>
      <th>Id</th>
      <th>Name</th>
      <th>Logo</th>
      <th>Slogan</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let t of teams">
      <td>{{t.tid}}</td>
      <td>{{t.tname}}</td>
      <td><img [src]="t.tlogo" width="50"> </td>
      <td>{{t.tslogan}}</td>
    </tr>
  </tbody>
</table>
