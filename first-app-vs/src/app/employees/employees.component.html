
<div class="container m-5 text-center mx-auto">
  <h2 class="bg-body-secondary p-2 text-grey text-center">Employee Details</h2>
  <table class="table table-hover table-dark">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Salary</th>
        <th>Date Of Joining</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let e of emps">
        <td>{{e.eid}}</td>
        <td>{{e.ename}}</td>
        <td>{{e.esalary}}</td>
        <td>{{e.edoj}}</td>
      </tr>
    </tbody>
  </table>
</div>
