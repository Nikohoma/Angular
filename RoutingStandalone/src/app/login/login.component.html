<form (ngSubmit)="login()">
  <div>
    <label>Username</label>
    <input type="text" name="username" [(ngModel)]="username">
  </div>

  <div>
    <label>Password</label>
    <input type="password" name="userpwd" [(ngModel)]="userpwd">
  </div>

  <button type="submit">Login</button>
</form>

<h2>{{ msg }}</h2>
