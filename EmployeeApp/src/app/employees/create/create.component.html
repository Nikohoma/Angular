<h1 class="text-center bg-success">Create New Employee</h1>


  
<form #employeeForm="ngForm" (ngSubmit)="onSubmit()">
  <div class="form-grid">
    <div class="form-group">
      <label for="name">Employee Name : </label>
      <input type="text" id="name" name="name" [(ngModel)]="employee.name" required maxlength="25" #name="ngModel" />
      <p *ngIf="name.invalid && name.touched" style="color:darkred">Name is invalid (length max :25)</p>

      <label for="phone">Employee Phone : </label>
      <input type="number" id="phone" name="phone" [(ngModel)]="employee.phoneNo" #phone="ngModel" required min="1000000000" max="9999999999"/>
      <p *ngIf="phone.invalid && phone.touched" style="color:darkred">Phone is invalid.</p>


      <label for="role">Employee Role : </label>
      <input type="text" id="role" name="role" [(ngModel)]="employee.role" #role ="ngModel" required/>
      <p *ngIf="role.invalid" style="color:darkred">Role is required.</p>

    </div>
  </div>
  <div>
    <button type="submit" [disabled] ="name.invalid || phone.invalid || role.invalid">Create Employee</button>
  </div>
</form>
