

<div class="container">
  <h1 class="text-dark text-decoration-underline text-center mx-auto my-5">Product List</h1>
  <table class="table table-dark table-hover table-striped-columns">
    <thead>
      <tr>
        <td>Product Id</td>
        <td>Product Name</td>
        <td>Price</td>
        <td>Mfg Date</td>
        <td>Exp Date</td>
      </tr>
    </thead>
    <tbody>
      @for(p of products;track p){
      <tr>
        <td>{{p.pid}}</td>
        <td>{{p.pname|uppercase}}</td>
        <td>{{p.pprice|currency:"INR"}}</td>
        <td>{{p.pmfg|date:"mediumDate"}}</td>
        <td>{{p.pexp|date:"fullDate"}}</td>
      </tr>
      }
    </tbody>
  </table>
</div>
